<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FocusFlow - 集中をデザインするタスクマネージャー</title>
  <meta name="description" content="シンプルで直感的なタスク管理アプリ。後回し防止・多段階通知・期限の視覚化で今日をやり遂げよう。">
  <meta name="theme-color" content="#7c6cf0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FocusFlow">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=1.1.0">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" class="login-screen">
  <div class="login-content">
    <div class="login-logo">⚡ FocusFlow</div>
    <h1>あなたの集中力を、<br>最大限に引き出す。</h1>
    <p>シンプルで直感的なタスク管理。どのデバイスからでも。ログインして始めましょう。</p>
    <button id="google-login-btn" class="login-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Googleでログイン
    </button>
  </div>
</div>

<!-- 紙吹雪コンテナ -->
<div id="confetti-container" class="confetti-container"></div>

<!-- 全タスク完了お祝いオーバーレイ -->
<div id="celebration-overlay" class="celebration-overlay" onclick="closeCelebration()">
  <div class="celebration-content">
    <div class="celebration-emoji-burst" id="emoji-burst"></div>
    <div class="celebration-stars" id="celebration-stars"></div>
    <h1 class="celebration-title">🎉 全部完了！</h1>
    <p class="celebration-sub">今日のタスクを全部やり遂げた！<br>本当によく頑張ったね✨</p>
    <div class="celebration-fireworks" id="fireworks"></div>
    <button class="celebration-close-btn">タップして閉じる</button>
  </div>
</div>



<!-- メインアプリ -->
<div class="app-wrapper" id="app-wrapper" style="display: none;">

  <!-- ヘッダー（スマホのステータスバー余白用） -->
  <header class="app-header"></header>

  <!-- 日付表示 -->
  <div class="date-section">
    <div class="date-info">
      <div id="date-today" class="date-today"></div>
      <div id="date-label" class="date-label"></div>
    </div>
    <div id="user-display" class="user-display" onclick="openProfileModal()"></div>
  </div>

  <!-- タブナビ -->
  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" data-tab="today" role="tab" onclick="switchTab('today')" id="tab-btn-today" style="flex: 4;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px;"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/></svg>
      今日
    </button>
    <button class="tab-btn" data-tab="schedule" role="tab" onclick="switchTab('schedule')" id="tab-btn-schedule" style="flex: 4;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px;"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
      スケジュール
    </button>
    <button class="tab-btn" data-tab="history" role="tab" onclick="switchTab('history')" id="tab-btn-history" style="flex: 2;" title="履歴">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
    </button>
  </nav>

  <!-- 今日タブ -->
  <div id="tab-today" class="tab-content active" role="tabpanel">

    <!-- 進捗バー -->
    <div class="progress-section">
      <div class="progress-header">
        <span>今日の進捗</span>
        <span id="progress-label">0 / 0 完了</span>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-fill" class="progress-bar-fill"></div>
      </div>
    </div>

    <!-- クイック入力 -->
    <section class="quick-add-section">
      <form id="quick-add-form" autocomplete="off">
        <div class="quick-add-form">
          <div class="quick-input-container">
            <input
              id="quick-input"
              class="quick-add-input"
              type="text"
              placeholder="今日やることを追加…"
              maxlength="100"
              aria-label="今日のタスクを入力"
            >
            <div class="quick-time-icon-wrapper" id="quick-time-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="quick-clock-icon">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              <div id="quick-time-display" class="quick-time-display-overlay"></div>
              <input 
                id="quick-time-input" 
                class="quick-time-input-hidden" 
                type="time" 
                aria-label="時間を設定"
                title="時間を設定"
                onchange="if(typeof updateQuickTimeDisplay === 'function') updateQuickTimeDisplay(this.value)"
              >
            </div>
          </div>
          <button type="submit" class="quick-add-btn" aria-label="追加">＋</button>
        </div>
        <input type="checkbox" id="quick-notif-1h" checked hidden>
      </form>
    </section>

    <!-- タスクリスト -->
    <section class="task-list-section">
      <div class="section-title">タスク一覧</div>
      <div id="today-task-list" class="task-list"></div>
    </section>

  </div>

  <!-- スケジュールタブ -->
  <div id="tab-schedule" class="tab-content" role="tabpanel">
    <section class="schedule-section">
      <div class="section-title">期限別スケジュール</div>
      <div id="schedule-list"></div>
    </section>
  </div>

  <!-- 履歴タブ -->
  <div id="tab-history" class="tab-content" role="tabpanel">
    <section class="history-section">
      <div class="section-title">完了済みのタスク</div>
      <div id="history-task-list" class="task-list"></div>
    </section>
  </div>

</div>

<!-- FAB: 詳細登録 -->
<button class="fab" onclick="openAddModal()" aria-label="タスクを詳細登録する" id="fab-add">＋</button>

<!-- ===== タスク登録/編集モーダル ===== -->
<div id="add-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 id="modal-title-text" class="modal-title">新しいタスク</h2>

    <!-- タイトル -->
    <div class="form-group">
      <label class="form-label" for="task-title-input">タイトル ＊</label>
      <input id="task-title-input" class="form-input" type="text"
             placeholder="タスク名を入力" maxlength="100">
    </div>

    <!-- メモ -->
    <div class="form-group">
      <label class="form-label" for="task-note-input">メモ（任意）</label>
      <textarea id="task-note-input" class="form-textarea"
                placeholder="詳細・やり方・参考リンクなど"></textarea>
    </div>

    <!-- 期限 -->
    <div class="form-group">
      <label class="form-label">期限（任意）</label>
      <div style="display: flex; gap: 8px;">
        <input id="task-date-input" class="form-input" type="date" style="flex: 1;" aria-label="期限日">
        <input id="task-time-input" class="form-input" type="time" style="width: 120px;" aria-label="期限時間">
      </div>
    </div>

    <!-- 優先度 -->
    <div class="form-group">
      <label class="form-label">優先度</label>
      <div class="priority-selector">
        <button class="priority-option" data-value="high" type="button">🔴 高</button>
        <button class="priority-option selected" data-value="mid" type="button">🟡 中</button>
        <button class="priority-option" data-value="low" type="button">🟢 低</button>
      </div>
    </div>

    <!-- 通知設定 -->
    <div class="form-group">
      <label class="form-label">通知タイミング</label>
      <div class="custom-multi-select" id="notif-select-wrapper">
        <div class="select-display" onclick="toggleNotifDropdown()">
          <span id="notif-display-text">通知設定を選択...</span>
          <span class="select-arrow">▼</span>
        </div>
        <div class="select-dropdown" id="notif-dropdown">
          <label class="select-option">
            <input type="checkbox" class="notif-checkbox" value="3d" onchange="updateNotifDisplay()"> 3日前に通知
          </label>
          <label class="select-option">
            <input type="checkbox" class="notif-checkbox" value="1d" checked onchange="updateNotifDisplay()"> 前日に通知
          </label>
          <label class="select-option">
            <input type="checkbox" class="notif-checkbox" value="3h" onchange="updateNotifDisplay()"> 3時間前に通知
          </label>
          <label class="select-option">
            <input type="checkbox" class="notif-checkbox" value="1h" onchange="updateNotifDisplay()"> 1時間前に通知
          </label>
          <label class="select-option">
            <input type="checkbox" class="notif-checkbox" value="morning" checked onchange="updateNotifDisplay()"> 当日の朝9時に通知
          </label>
        </div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 24px;">
      <button class="btn-primary" onclick="saveTask()" id="save-task-btn">保存する</button>
      <button class="btn-postpone" onclick="handleEditPostpone()" id="edit-postpone-btn" style="display: none;">😈 後回しにしちゃう</button>
      <button class="btn-danger" onclick="closeAddModal()" id="cancel-task-btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ===== 後回しモーダル ===== -->
<div id="postpone-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">😅 後回しにしちゃう</h2>
    <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:16px;">
      「<span id="postpone-task-name" style="color:var(--text-primary);font-weight:600;"></span>」<br>
      どれくらい後回しにする？
    </p>

    <div class="postpone-options">
      <button class="postpone-option" onclick="doPostpone(1)" id="postpone-1d">
        <span class="option-emoji">📆</span>
        <div>
          <div>明日に延ばす</div>
          <div class="option-desc">1日後に設定します</div>
        </div>
      </button>
      <button class="postpone-option" onclick="doPostpone(3)" id="postpone-3d">
        <span class="option-emoji">🗓</span>
        <div>
          <div>3日後に延ばす</div>
          <div class="option-desc">ちょっと余裕を持って</div>
        </div>
      </button>
      <button class="postpone-option" onclick="doPostpone(7)" id="postpone-7d">
        <span class="option-emoji">📅</span>
        <div>
          <div>1週間後に延ばす</div>
          <div class="option-desc">しっかり準備してから</div>
        </div>
      </button>
    </div>

    <button class="btn-danger" onclick="closePostponeModal()" id="cancel-postpone-btn">やっぱりやる！💪</button>
  </div>
</div>

<!-- ===== タスク詳細ポップアップ ===== -->
<div id="detail-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

    <h2 id="detail-task-title" class="detail-title"></h2>

    <p id="detail-task-note" class="detail-note"></p>

    <div class="detail-info-grid">
      <div class="detail-info-row">
        <span class="detail-info-label">期限</span>
        <span id="detail-task-deadline" class="detail-info-value"></span>
      </div>
      <div class="detail-info-row">
        <span class="detail-info-label">🎯 優先度</span>
        <span id="detail-task-priority" class="detail-info-value"></span>
      </div>
      <div class="detail-info-row" id="detail-postpone-row">
        <span class="detail-info-label">😅 後回し</span>
        <span id="detail-postpone-count" class="detail-info-value" style="color:var(--accent-pink);"></span>
      </div>
    </div>

    <button id="detail-postpone-btn" class="postpone-btn-large">
      😅 後回しにしちゃう
    </button>

    <div class="detail-footer">
      <button id="detail-edit-btn" class="btn-primary">✏️ 編集する</button>
      <button class="btn-danger" onclick="closeTaskDetail()">閉じる</button>
    </div>
  </div>
</div>

<!-- ===== プロフィールモーダル ===== -->
<div id="profile-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">👤 プロフィール設定</h2>
    <div class="form-group" style="margin-top: 10px;">
      <label class="form-label">表示名</label>
      <input id="profile-name-input" class="form-input" type="text" placeholder="お名前を入力">
    </div>
    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 24px;">
      <button class="btn-primary" onclick="saveProfile()">保存する</button>
      <button class="btn-danger" onclick="closeProfileModal()">キャンセル</button>
      <button class="btn-postpone" style="margin-top: 10px; opacity: 0.6;" onclick="logout()">ログアウト</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
